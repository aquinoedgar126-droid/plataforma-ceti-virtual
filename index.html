<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CETI Virtual - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

 <div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4 login-card">
    
    <div class="text-center mb-3">
      <img src="img/CETI_Logo.png" alt="Logo escuela" class="login-logo">
    </div>

    <h2 class="text-center mb-2">CETI Virtual</h2>
    <p class="text-center text-muted">Inicio de sesión</p>
    <p class="text-center text-muted small mb-4">Acceso a la plataforma académica institucional</p>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Matrícula</label>
        <input type="text" class="form-control" id="matricula" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" required>
      </div>

      <div id="mensajeError" class="text-danger mb-3 fw-bold text-center"></div>

      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
  </div>
</div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const matricula = document.getElementById("matricula").value.trim();
      const password = document.getElementById("password").value.trim();
      const mensajeError = document.getElementById("mensajeError");

      const usuarios = [
  {
    matricula: "50001",
    password: "1234",
    nombre: "Edgar David Aquino Huerta",
    semestre: "8°",
    genero: "M"
  },
  {
    matricula: "50002",
    password: "abcd",
    nombre: "Ana María López Padilla",
    semestre: "7°",
    genero: "F"
  },
  {
    matricula: "50003",
    password: "2026",
    nombre: "Luis Angel Ramírez Valencia",
    semestre: "6°",
    genero: "M"
  }
];

const usuarioEncontrado = usuarios.find(user => 
  user.matricula === matricula && user.password === password
);

if (usuarioEncontrado) {
  localStorage.setItem("usuario", JSON.stringify(usuarioEncontrado));
  window.location.href = "app.html";
} else {
  mensajeError.textContent = "Matrícula o contraseña incorrectas.";
}
  });
  </script>

</body>
</html>
